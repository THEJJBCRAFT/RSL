<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RSL Live</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.debug {
      background: #101722;
    }

    .overlay {
      position: absolute;
      top: 60px;
      left: 70px;
      color: white;
      text-shadow: 0 2px 7px rgba(0, 0, 0, .45);
    }

    .topline {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .logo-box {
      width: 82px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, .14);
      background: #941523;
      box-shadow: 0 2px 7px rgba(0, 0, 0, .28);
    }

    .logo-box img {
      max-width: 64px;
      max-height: 28px;
      display: block;
    }

    .cut {
      width: 2px;
      height: 31px;
      background: #d7192d;
      transform: skewX(-12deg);
    }

    .live {
      height: 34px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 3px;
      background: #d7192d;
      border: 1px solid rgba(255, 255, 255, .18);
      font-size: 15px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .text {
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.25;
      font-weight: 900;
      text-transform: uppercase;
      color: #d7192d;
      background: linear-gradient(90deg, #d7192d 0%, #d7192d 38%, #111 50%, #d7192d 62%, #d7192d 100%);
      background-size: 220% 100%;
      background-position: 0% 50%;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: textSideMix 3s ease-in-out infinite;
    }

    @keyframes textSideMix {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="topline">
      <div class="logo-box">
        <img src="rsl_logo_cropped.png" alt="RSL">
      </div>
      <div class="cut"></div>
      <div class="live">LIVE</div>
    </div>

    <div class="text">
      Redstone Labs<br>
      2026
    </div>
  </div>
</body>
</html>
