<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redstone Labs - Intro</title>
  <style>
    :root {
      --red: #e62134;
      --text: #fff;
      --intro-time: 30s;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.debug {
      background: #132033;
    }

    .intro {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text);
      pointer-events: none;
      animation: introOut var(--intro-time) ease-in forwards;
    }

    .clip {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: .72;
      transform: scale(1.08);
      filter: saturate(1.08) contrast(1.08);
      background:
        radial-gradient(circle at 28% 42%, rgba(230, 33, 52, .38), transparent 28%),
        linear-gradient(135deg, rgba(9, 11, 14, .96), rgba(43, 8, 13, .94));
    }

    .clip iframe,
    .clip #ytPlayer {
      position: relative;
      z-index: 0;
      width: 100vw;
      height: 56.25vw;
      min-width: 177.78vh;
      min-height: 100vh;
      border: 0;
      opacity: .42;
      filter: blur(1px) saturate(1.35) contrast(1.08);
    }

    .fallback {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: .58;
      background:
        repeating-linear-gradient(0deg, transparent 0 47px, rgba(255, 255, 255, .06) 47px 48px),
        repeating-linear-gradient(90deg, transparent 0 47px, rgba(255, 255, 255, .045) 47px 48px),
        linear-gradient(135deg, #06070a, #26060b 48%, #07080a);
    }

    .fallback::before,
    .fallback::after {
      content: "";
      position: absolute;
      width: 44vw;
      height: 6px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, var(--red), #ff8790, transparent);
      box-shadow: 0 0 22px rgba(230, 33, 52, .9);
      animation: redstoneTrace 1.8s linear infinite;
    }

    .fallback::before {
      top: 34%;
      left: -45vw;
    }

    .fallback::after {
      right: -45vw;
      bottom: 34%;
      animation-delay: .7s;
      animation-direction: reverse;
    }

    .shade {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at center, transparent 0 30%, rgba(0, 0, 0, .34) 60%, rgba(0, 0, 0, .62) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, .44), transparent 32%, transparent 68%, rgba(0, 0, 0, .44));
    }

    .sweep {
      position: absolute;
      inset: -22%;
      z-index: 3;
      background: linear-gradient(110deg, transparent 38%, rgba(255, 255, 255, .2) 48%, rgba(230, 33, 52, .34) 52%, transparent 64%);
      transform: translateX(-80%) skewX(-8deg);
      animation: signalSweep 2.5s ease-in-out forwards;
    }

    .bug {
      position: relative;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 8px;
      filter: drop-shadow(0 8px 22px rgba(0, 0, 0, .55));
      transform: translateY(12px) scale(.86);
      opacity: 0;
      animation: bugIn .7s cubic-bezier(.2, .9, .2, 1) .25s forwards, bugPunch 1.1s ease-in-out 1.1s forwards;
    }

    .bug::before {
      content: "";
      position: absolute;
      z-index: -1;
      left: 50%;
      top: 50%;
      width: 620px;
      height: 136px;
      border-radius: 4px;
      background: radial-gradient(circle at center, rgba(0, 0, 0, .84), rgba(0, 0, 0, .62) 58%, transparent 78%);
      transform: translate(-50%, -50%);
    }

    .logo {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(0, 0, 0, .56);
      color: var(--text);
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
      box-shadow: inset 0 0 18px rgba(230, 33, 52, .18);
    }

    .spark {
      width: 20px;
      height: 20px;
      background: var(--red);
      clip-path: polygon(52% 0, 100% 42%, 67% 42%, 82% 100%, 25% 35%, 58% 35%);
      animation: sparkFlash .9s steps(2, end) infinite;
    }

    .live {
      height: 44px;
      padding: 0 15px;
      display: grid;
      place-items: center;
      border-radius: 3px;
      background: var(--red);
      border: 1px solid rgba(255, 255, 255, .18);
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
      animation: livePulse 1s ease-in-out infinite;
    }

    .caption {
      position: absolute;
      z-index: 4;
      left: 50%;
      top: calc(50% + 42px);
      width: max-content;
      max-width: 90vw;
      padding: 5px 9px;
      border-left: 3px solid var(--red);
      background: rgba(0, 0, 0, .42);
      color: rgba(255, 255, 255, .9);
      font-size: 12px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
      opacity: 0;
      transform: translateX(-50%);
      animation: captionIn .55s ease .55s forwards;
    }

    @keyframes introOut {
      0%,
      72% {
        opacity: 1;
        visibility: visible;
      }

      100% {
        opacity: 0;
        visibility: hidden;
      }
    }

    @keyframes bugIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes bugPunch {
      0%,
      100% {
        transform: scale(1);
      }

      38% {
        transform: scale(1.08);
      }
    }

    @keyframes captionIn {
      to {
        opacity: 1;
      }
    }

    @keyframes livePulse {
      0%,
      100% {
        box-shadow: 0 0 0 rgba(230, 33, 52, 0);
      }

      50% {
        box-shadow: 0 0 24px rgba(230, 33, 52, .9);
      }
    }

    @keyframes sparkFlash {
      50% {
        background: #fff;
        filter: drop-shadow(0 0 12px var(--red));
      }
    }

    @keyframes signalSweep {
      0% {
        transform: translateX(-80%) skewX(-8deg);
      }

      100% {
        transform: translateX(80%) skewX(-8deg);
      }
    }

    @keyframes redstoneTrace {
      to {
        transform: translateX(245%);
      }
    }
  </style>
</head>
<body>
  <div class="intro">
    <div class="clip">
      <div class="fallback"></div>
      <div id="ytPlayer"></div>
    </div>

    <div class="shade"></div>
    <div class="sweep"></div>

    <div class="bug">
      <div class="logo"><span class="spark"></span><span>RL</span></div>
      <div class="live">LIVE</div>
    </div>

    <div class="caption">Redstone Labs Intro</div>
  </div>

  <audio id="introMusic" src="brass_bloodlines.mp3" preload="auto"></audio>

  <script>
    const introMusic = document.getElementById("introMusic");
    const introClips = [
      { videoId: "IfL7lULKrFQ", start: 0, end: 10 },
      { videoId: "aFcWDtwRGD0", start: 0, end: 10 },
      { videoId: "DFObjYHg_9E", start: 598, end: 608 }
    ];
    const maxVolume = 0.68;
    const introDuration = 30000;
    const fadeInDuration = 1500;
    const fadeOutStart = 27000;
    const fadeOutDuration = 3000;
    let ytPlayer;
    let clipTimersStarted = false;

    function loadYoutubeApi() {
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    }

    function playIntroClip(index) {
      if (!ytPlayer || !introClips[index]) {
        return;
      }

      const clip = introClips[index];
      ytPlayer.loadVideoById({
        videoId: clip.videoId,
        startSeconds: clip.start,
        endSeconds: clip.end
      });
      ytPlayer.mute();
      ytPlayer.playVideo();
    }

    function startIntroClips() {
      if (clipTimersStarted || !ytPlayer) {
        return;
      }

      clipTimersStarted = true;
      playIntroClip(0);
      window.setTimeout(() => playIntroClip(1), 10000);
      window.setTimeout(() => playIntroClip(2), 20000);
      window.setTimeout(() => {
        if (ytPlayer) {
          ytPlayer.stopVideo();
        }
      }, introDuration);
    }

    window.onYouTubeIframeAPIReady = function () {
      ytPlayer = new YT.Player("ytPlayer", {
        videoId: introClips[0].videoId,
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          modestbranding: 1,
          mute: 1,
          playsinline: 1,
          rel: 0,
          start: introClips[0].start,
          end: introClips[0].end
        },
        events: {
          onReady: function (event) {
            event.target.mute();
            startIntroClips();
          }
        }
      });
    };

    function setMusicVolumeAt(elapsed) {
      if (elapsed < fadeInDuration) {
        introMusic.volume = maxVolume * (elapsed / fadeInDuration);
        return;
      }

      if (elapsed >= fadeOutStart) {
        const fadeOutProgress = Math.min((elapsed - fadeOutStart) / fadeOutDuration, 1);
        introMusic.volume = maxVolume * (1 - fadeOutProgress);
        return;
      }

      introMusic.volume = maxVolume;
    }

    function startIntroMusic() {
      introMusic.volume = 0;
      introMusic.currentTime = 0;

      const playPromise = introMusic.play();
      if (playPromise) {
        playPromise.catch(() => {
          document.addEventListener("pointerdown", startIntroMusic, { once: true });
          document.addEventListener("keydown", startIntroMusic, { once: true });
        });
      }

      const start = performance.now();
      function animateVolume(now) {
        const elapsed = now - start;
        setMusicVolumeAt(elapsed);

        if (elapsed < introDuration) {
          requestAnimationFrame(animateVolume);
          return;
        }

        introMusic.pause();
        introMusic.volume = 0;
      }

      requestAnimationFrame(animateVolume);
    }

    window.addEventListener("load", startIntroMusic);
    loadYoutubeApi();
  </script>
</body>
</html>
